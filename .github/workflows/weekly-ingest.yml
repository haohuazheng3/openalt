name: Weekly ingest

# Re-crawls GitHub + awesome-selfhosted every Monday and upserts fresh projects.
# New projects land as `pending` for review in /admin; existing ones get their
# stars / last-commit refreshed and dead repos flipped to `archived`.
#
# Configure secrets in: Repo → Settings → Secrets and variables → Actions
#   DATABASE_URL          (required)  — your Neon pooled connection string
#   GITHUB_TOKEN          (provided)  — the default token works; PAT optional
#   ANTHROPIC_API_KEY     (optional)  — enables Claude extraction
#   VERCEL_DEPLOY_HOOK_URL(optional)  — to refresh ISR pages after ingest

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max candidates to process'
        required: false
        default: '80'
      status:
        description: 'Status for new projects (pending|live)'
        required: false
        default: 'pending'

concurrency:
  group: weekly-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run ingester
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-8' }}
          INGEST_MAX_PER_SOURCE: '80'
          INGEST_MIN_STARS: ${{ vars.INGEST_MIN_STARS || '200' }}
        run: |
          python ingest/run.py \
            --source all \
            --limit ${{ github.event.inputs.limit || '80' }} \
            --status ${{ github.event.inputs.status || 'pending' }}

      # Optional: refresh ISR pages immediately via a Vercel Deploy Hook.
      - name: Trigger Vercel redeploy (optional)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" || true
