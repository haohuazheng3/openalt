name: Weekly SEO report

# Pulls the last 28 days of Google Search Console data and posts an action list
# (impressions-but-no-clicks → rewrite titles; impressions-but-weak-rank → build
# a page; sitemap errors → alert) to the workflow run summary every Monday.
#
# Requires repo secret GOOGLE_SERVICE_ACCOUNT_JSON (the SEO service account that
# owns the sc-domain:openreplace.com property).

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate Search Console action report
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/gsc-report.mjs
