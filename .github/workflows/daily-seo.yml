name: Daily SEO

# Daily: (1) submit all live URLs to IndexNow so new/changed pages get crawled
# fast, and (2) pull Search Console data and post an action list to the run
# summary (impressions-no-clicks → rewrite titles; impressions-weak-rank →
# build a page; sitemap errors → alert).
#
# Requires repo secret GOOGLE_SERVICE_ACCOUNT_JSON (owner of sc-domain:openreplace.com).

on:
  schedule:
    - cron: '0 7 * * *' # daily 07:00 UTC
  workflow_dispatch:

jobs:
  seo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ping IndexNow with all live URLs
        run: node scripts/indexnow-submit.mjs

      - name: Search Console action report
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/gsc-report.mjs
